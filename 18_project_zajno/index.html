<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>18_project_zajno</title>
        <link rel="stylesheet" href="src/style.css" />
    </head>
    <body>
        <main class="main w-full bg-[#EBEBEB]">
            <!-- Landing -->
            <section class="landing relative w-full">
                <!-- Navbar -->
                <nav
                    class="nav absolute w-full top-0 left-0 flex justify-between text-sm px-4 py-3"
                >
                    <a class="font-bold tracking-tight" href="#">zajno</a>
                    <a class="font-bold tracking-tight" href="#"
                        >digital studio</a
                    >
                    <div class="flex flex-col ml-10">
                        <a class="font-bold tracking-tight" href="#">Work</a>
                        <a class="font-bold tracking-tight" href="#">Studio</a>
                        <a class="font-bold tracking-tight" href="#">Contact</a>
                    </div>
                    <div class="flex flex-col">
                        <a class="font-bold tracking-tight" href="#"
                            >Instagram</a
                        >
                        <a class="font-bold tracking-tight" href="#">Twitter</a>
                    </div>
                    <a class="font-bold tracking-tight" href="#"
                        >Los Angeles, ca</a
                    >
                </nav>

                <!-- Branding Section -->
                <div class="branding w-full">
                    <img src="./image.png" alt="" class="logo w-full" />
                </div>
            </section>

            <section class="video relative w-full h-[80vh]">
                <button
                    class="watch absolute top-1/2 left-1/2 -translate-x-1/2 px-5 py-2 bg-white/20 rounded-full backdrop-blur-2xl active:scale-95"
                >
                    Watch Showreel
                </button>
                <img
                    src="./image2.png"
                    class="image2 w-full h-full object-top object-cover"
                    alt=""
                />
            </section>

            <!-- Work -->

            <section class="work">
                <div
                    class="part1 w-[20%] py-10 flex gap-1 items-end text-2xl font-bold px-4 py-3"
                >
                    <h3>Work</h3>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="22"
                        height="22"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-arrow-down-right-icon lucide-arrow-down-right"
                    >
                        <path d="m7 7 10 10" />
                        <path d="M17 7v10H7" />
                    </svg>
                </div>
                <div class="part2 w-[80%]"></div>
            </section>
        </main>

        <!-- <canvas class="threeJs w-full h-screen"></canvas> -->
        <!-- <script type="module" src="/src/main.js"></script> -->
    </body>
</html>
